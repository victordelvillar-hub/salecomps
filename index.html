<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AgentEdge SaleComps — DC Sales Database v11</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<style>
:root {
  --navy: #0a1628;
  --navy-mid: #112240;
  --navy-light: #1a3a5c;
  --gold: #f0a500;
  --gold-light: #f7c948;
  --white: #ffffff;
  --off-white: #f4f6f9;
  --gray: #8892a4;
  --gray-light: #e8ecf2;
  --text: #1a2332;
  --green: #00c48c;
  --amber: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --card-shadow: 0 4px 24px rgba(10,22,40,0.12);
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--white);
  height: 100vh;
  overflow: hidden;
}

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 50%, #0d1f3c 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 0;
}
.login-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(240,165,0,0.2);
  border-radius: 20px;
  padding: 48px 40px;
  width: 360px;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .brand {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.5px;
}
.login-logo .brand span { color: var(--gold); }
.login-logo .sub {
  font-size: 12px;
  color: var(--gray);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}
.login-card input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--white);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
.login-card input:focus { border-color: var(--gold); }
.login-card input::placeholder { color: var(--gray); }
.login-btn {
  width: 100%;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.5px;
}
.login-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.login-error {
  color: #ef4444;
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

/* ── APP LAYOUT ── */
#app { display: none; height: 100vh; flex-direction: column; }

/* ── TOP NAV ── */
.topnav {
  background: var(--navy);
  border-bottom: 1px solid rgba(240,165,0,0.15);
  padding: 0 16px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 100;
}
.nav-brand {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}
.nav-brand span { color: var(--gold); }
.nav-brand .product {
  font-size: 11px;
  font-weight: 400;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: block;
  margin-top: -3px;
}
.nav-stats {
  display: flex;
  gap: 20px;
  align-items: center;
}
.nav-stat {
  text-align: center;
  cursor: default;
}
.nav-stat .val {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.nav-stat .lbl {
  font-size: 9px;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── SEARCH BAR ── */
.searchbar-wrap {
  background: var(--navy-mid);
  padding: 10px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.search-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.search-input-wrap {
  flex: 1;
  position: relative;
}
.search-input-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 10px 14px 10px 36px;
  color: var(--white);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-input-wrap input:focus { border-color: var(--gold); }
.search-input-wrap input::placeholder { color: var(--gray); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray);
  font-size: 14px;
}
.near-me-btn {
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Syne', sans-serif;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.near-me-btn:hover { background: var(--gold-light); }
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.fsel {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--white);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 10px;
  outline: none;
  cursor: pointer;
  white-space: nowrap;
  appearance: none;
  -webkit-appearance: none;
}
.fsel:focus { border-color: var(--gold); }
.status-pills {
  display: flex;
  gap: 6px;
}
.pill {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.3px;
}
.pill.all { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.pill.active-pill { background: rgba(0,196,140,0.15); color: var(--green); border-color: var(--green); }
.pill.closed-pill { background: rgba(239,68,68,0.15); color: var(--red); border-color: var(--red); }
.pill.contract-pill { background: rgba(245,158,11,0.15); color: var(--amber); border-color: var(--amber); }
.pill.pending-pill { background: rgba(139,92,246,0.15); color: var(--purple); border-color: var(--purple); }
.pill.soon-pill { background: rgba(59,130,246,0.15); color: var(--blue); border-color: var(--blue); }
.pill:not(.all):not(.active-pill):not(.closed-pill):not(.contract-pill):not(.pending-pill):not(.soon-pill) {
  background: rgba(255,255,255,0.07);
  color: var(--gray);
  border-color: rgba(255,255,255,0.1);
}

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── LIST PANEL ── */
#list-panel {
  width: 320px;
  background: var(--off-white);
  overflow-y: auto;
  flex-shrink: 0;
  border-right: 1px solid var(--gray-light);
}
.list-header {
  padding: 12px 14px;
  background: var(--white);
  border-bottom: 1px solid var(--gray-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.list-header .count {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-family: 'Syne', sans-serif;
}
.sort-sel {
  background: transparent;
  border: none;
  font-size: 12px;
  color: var(--gray);
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  outline: none;
}

/* ── PROPERTY CARDS ── */
.prop-card {
  background: var(--white);
  border-bottom: 1px solid var(--gray-light);
  padding: 14px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.prop-card:hover { background: #f0f4fa; }
.prop-card.selected { background: #e8f0fe; border-left: 3px solid var(--gold); }
.card-addr {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  font-family: 'Syne', sans-serif;
}
.card-sub {
  font-size: 11px;
  color: var(--gray);
  margin-bottom: 8px;
}
.card-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  font-family: 'Syne', sans-serif;
  margin-bottom: 6px;
}
.card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.3px;
}
.tag-beds { background: var(--navy); color: var(--white); }
.tag-status-Active { background: rgba(0,196,140,0.15); color: #00a876; }
.tag-status-Closed { background: rgba(239,68,68,0.12); color: #dc2626; }
.tag-status-ActiveUnderContract { background: rgba(245,158,11,0.15); color: #d97706; }
.tag-status-Pending { background: rgba(139,92,246,0.15); color: #7c3aed; }
.tag-status-ComingSoon { background: rgba(59,130,246,0.15); color: #2563eb; }
.tag-sqft { background: var(--gray-light); color: var(--gray); }
.tag-dom { background: var(--gray-light); color: var(--gray); }

/* ── MAP ── */
#map {
  flex: 1;
  z-index: 1;
}
.leaflet-container { background: #e8ecf2 !important; }

/* ── FLOATING MAP BUTTONS ── */
.map-controls {
  position: absolute;
  right: 12px;
  top: 12px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.map-btn {
  background: var(--navy);
  border: 1px solid rgba(240,165,0,0.3);
  border-radius: 10px;
  color: var(--white);
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  font-family: 'Syne', sans-serif;
  transition: all 0.15s;
  min-width: 56px;
  letter-spacing: 0.3px;
}
.map-btn:hover { background: var(--navy-light); border-color: var(--gold); }
.map-btn .ico { font-size: 16px; display: block; margin-bottom: 2px; }

/* ── DETAIL PANEL ── */
#detail-panel {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 380px;
  background: var(--white);
  z-index: 600;
  overflow-y: auto;
  box-shadow: -8px 0 32px rgba(10,22,40,0.2);
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#detail-panel.open { transform: translateX(0); }
.det-header {
  background: var(--navy);
  padding: 20px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.det-close {
  position: absolute;
  right: 16px;
  top: 16px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: var(--white);
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.det-close:hover { background: rgba(255,255,255,0.2); }
.det-addr {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 4px;
  padding-right: 40px;
}
.det-sub {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.det-status-label {
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.det-price {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--gold);
  line-height: 1;
}
.det-body { padding: 20px; }
.det-section {
  margin-bottom: 24px;
}
.det-section-title {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--gray-light);
}
.det-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.det-field {
  background: var(--off-white);
  border-radius: 8px;
  padding: 10px 12px;
}
.det-field .lbl {
  font-size: 10px;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 3px;
}
.det-field .val {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  font-family: 'Syne', sans-serif;
}

/* ── COMPS ── */
.comp-tier-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px 0 6px;
}
.comp-tier-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-family: 'Syne', sans-serif;
  white-space: nowrap;
}
.comp-tier-label.sold { color: var(--red); }
.comp-tier-label.contract { color: var(--amber); }
.comp-tier-label.active { color: var(--green); }
.comp-tier-line { flex: 1; height: 1px; background: var(--gray-light); }
.comp-radius-toggle { display: flex; gap: 4px; margin-bottom: 12px; }
.comp-radius-btn {
  flex: 1;
  padding: 5px 0;
  background: var(--gray-light);
  border: none;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray);
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.comp-radius-btn.active { background: var(--navy); color: var(--gold); }
.comp-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--off-white);
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.comp-item:hover { background: var(--gray-light); }
.comp-item.contract-item { border-left: 3px solid var(--amber); }
.comp-item.active-item { border-left: 3px solid var(--green); }
.comp-addr { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; }
.comp-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
.comp-price { font-size: 14px; font-weight: 700; color: var(--navy); font-family: 'Syne', sans-serif; white-space: nowrap; margin-left: 12px; }
.comp-empty { color: var(--gray); font-size: 12px; font-style: italic; padding: 4px 0 8px; }

/* ── AGENT CARD ── */
.agent-card {
  background: var(--navy);
  border-radius: 10px;
  padding: 14px;
  color: var(--white);
}
.agent-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}
.agent-office {
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 10px;
}
.agent-phone {
  font-size: 13px;
  color: var(--gray);
}

/* ── LEGEND ── */
.map-legend {
  position: absolute;
  bottom: 24px;
  left: 328px;
  background: var(--navy);
  border: 1px solid rgba(240,165,0,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  z-index: 500;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--gray);
  font-family: 'DM Sans', sans-serif;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  #list-panel { display: none; }
  #detail-panel { width: 100%; }
  .map-legend { left: 12px; }
  .nav-stats { gap: 12px; }
  .nav-stat .val { font-size: 13px; }
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--gray);
}
.empty-state .ico { font-size: 32px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── SCROLLBAR ── */
#list-panel::-webkit-scrollbar { width: 4px; }
#list-panel::-webkit-scrollbar-track { background: transparent; }
#list-panel::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 2px; }
#detail-panel::-webkit-scrollbar { width: 4px; }
#detail-panel::-webkit-scrollbar-track { background: transparent; }
#detail-panel::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 2px; }

.zip-tip{background:rgba(13,27,42,0.9);color:#fff;border:none;border-radius:6px;font-size:.75rem;padding:4px 8px;}

/* ── CMA MODE in detail panel ── */
.det-cma-bar {
  margin-top: 14px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.det-start-cma-btn {
  flex: 1;
  padding: 11px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.det-start-cma-btn:hover { background: var(--gold-light); }
.det-start-cma-btn.cma-active {
  background: rgba(240,165,0,0.15);
  color: var(--gold);
  border: 1px solid rgba(240,165,0,0.4);
}

/* CMA mode banner inside det-body */
.cma-mode-banner {
  background: rgba(240,165,0,0.1);
  border: 1px solid rgba(240,165,0,0.25);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cma-mode-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.cma-back-btn {
  background: none;
  border: 1px solid rgba(240,165,0,0.3);
  border-radius: 6px;
  color: var(--gold);
  font-size: 11px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.cma-back-btn:hover { background: rgba(240,165,0,0.1); }

/* CMA comp slots */
.cma-comp-slot {
  background: var(--off-white);
  border-radius: 8px;
  margin-bottom: 6px;
  overflow: hidden;
  border: 1px solid var(--gray-light);
  transition: border-color 0.15s;
}
.cma-comp-slot.replacing {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(240,165,0,0.15);
}
.cma-comp-slot.sold-slot   { border-left: 3px solid var(--red); }
.cma-comp-slot.contract-slot { border-left: 3px solid var(--amber); }
.cma-comp-slot.active-slot   { border-left: 3px solid var(--green); }
.cma-slot-content {
  display: flex;
  align-items: center;
  padding: 10px 10px 10px 12px;
  gap: 8px;
  cursor: pointer;
}
.cma-slot-content:hover { background: #f0f4fa; }
.cma-slot-info { flex: 1; min-width: 0; }
.cma-slot-addr {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cma-slot-meta { font-size: 11px; color: var(--gray); margin-top: 1px; }
.cma-slot-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  font-family: 'Syne', sans-serif;
  white-space: nowrap;
}
.cma-slot-actions {
  display: flex;
  border-top: 1px solid var(--gray-light);
}
.cma-slot-act-btn {
  flex: 1;
  padding: 7px 0;
  border: none;
  background: transparent;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: background 0.12s;
  letter-spacing: 0.3px;
}
.cma-slot-act-btn.remove { color: var(--red); }
.cma-slot-act-btn.remove:hover { background: rgba(239,68,68,0.08); }
.cma-slot-act-btn.replace { color: var(--blue); border-left: 1px solid var(--gray-light); }
.cma-slot-act-btn.replace:hover { background: rgba(59,130,246,0.08); }
.cma-slot-act-btn.replace.active { background: rgba(59,130,246,0.12); color: var(--blue); }

/* Empty slot */
.cma-slot-preview {
  border-top: 1px solid var(--gray-light);
  padding: 10px 12px;
  background: var(--white);
  display: none;
}
.cma-slot-preview.open { display: block; }
.cma-slot-preview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.cma-preview-field .lbl {
  font-size: 9px;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.cma-preview-field .val {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  font-family: 'Syne', sans-serif;
}
.cma-slot-pan-btn {
  display: block;
  width: 100%;
  padding: 7px;
  background: rgba(10,22,40,0.06);
  border: none;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  color: var(--navy);
  cursor: pointer;
  transition: background 0.12s;
}
.cma-slot-pan-btn:hover { background: rgba(10,22,40,0.12); }

/* Empty slot */
.cma-empty-slot {
  border: 1.5px dashed var(--gray-light);
  border-radius: 8px;
  margin-bottom: 6px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 52px;
  cursor: default;
  transition: border-color 0.15s;
}
.cma-empty-slot.replacing {
  border-color: var(--gold);
  background: rgba(240,165,0,0.04);
  cursor: crosshair;
}
.cma-empty-slot-text {
  font-size: 12px;
  color: var(--gray);
  font-family: 'DM Sans', sans-serif;
}
.cma-empty-slot.replacing .cma-empty-slot-text { color: var(--gold); font-weight: 600; }

/* Replace mode map overlay hint */
#replace-hint {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--navy);
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  color: var(--white);
  z-index: 700;
  display: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  pointer-events: none;
}
#replace-hint span { color: var(--gold); }

/* CMA summary footer (inside det-body) */
.cma-summary-block {
  background: var(--navy);
  border-radius: 10px;
  padding: 14px;
  margin-top: 8px;
  margin-bottom: 12px;
}
.cma-summary-stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cma-sum-stat .val {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.cma-sum-stat .lbl {
  font-size: 9px;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}
.cma-action-btns {
  display: flex;
  gap: 8px;
}
.cma-act-btn {
  flex: 1;
  padding: 10px 8px;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.cma-act-copy {
  background: rgba(255,255,255,0.1);
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.15);
}
.cma-act-copy:hover { background: rgba(255,255,255,0.18); }
.cma-act-generate {
  background: rgba(255,255,255,0.06);
  color: var(--gray);
  cursor: not-allowed;
  position: relative;
}
.cma-act-generate:hover::after {
  content: 'Coming Soon';
  position: absolute;

  left: 50%;

  border-radius: 6px;

<script>
// ── DATA ──
let D=[];
let _dataLoaded=false;
let markers={};
let map,markerLayer;
let activeStatus='all';
let selectedId=null;
let listVisible=true;
let drawPolygon=null;
let zipShadingOn=false;
let zipLayer=null;
// ── LOGIN ──
function tryLogin(){
  const pw=document.getElementById('pw-input').value;
  if(pw==='agentedge2025'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    requestAnimationFrame(()=>{
      initMap();
      fetch('salecomps-data.json')
        .then(r=>r.json())
        .then(data=>{D=data;_dataLoaded=true;map.invalidateSize();applyFilters();})
        .catch(e=>console.error('Data load failed:',e));
    });
  } else {
    document.getElementById('login-err').textContent='Incorrect password';
    document.getElementById('pw-input').value='';
  }
}
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});

// ── STATUS COLORS ──
function statusColor(s){
  if(s==='Active') return '#00c48c';
  if(s==='Closed') return '#ef4444';
  if(s==='ActiveUnderContract') return '#f59e0b';
  if(s==='Pending') return '#8b5cf6';
  if(s==='ComingSoon') return '#3b82f6';
  return '#8892a4';
}

function statusLabel(s){
  if(s==='Active') return 'Active';
  if(s==='Closed') return 'Sold';
  if(s==='ActiveUnderContract') return 'Under Contract';
  if(s==='Pending') return 'Pending';
  if(s==='ComingSoon') return 'Coming Soon';
  return s;
}

// ── MAP ──
function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([38.9072,-77.0369],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);

  // Draw control
  drawnItems=L.featureGroup().addTo(map);
  drawControl=new L.Control.Draw({
    draw:{polygon:{shapeOptions:{color:'#0a9396',weight:2,fillOpacity:0.1}},rectangle:{shapeOptions:{color:'#0a9396',weight:2,fillOpacity:0.1}},circle:false,marker:false,circlemarker:false,polyline:false},
    edit:{featureGroup:drawnItems,remove:true}
  });
  drawControl.addTo(map);
  // Hide the Leaflet toolbar — we drive drawing via L.Draw.Polygon API directly
  setTimeout(function(){
    const tb=document.querySelector('.leaflet-draw');
    if(tb) tb.style.display='none';
  },300);

  map.on('draw:created',function(e){
    drawnItems.clearLayers();
    drawnItems.addLayer(e.layer);
    drawPolygon=e.layer;
    _drawHandler=null;
    document.getElementById('draw-btn').style.background='#ee9b00';
    document.getElementById('draw-btn').textContent='✏️ Clear';
    applyFilters();
  });
  map.on('draw:drawstop',function(){
    // User pressed Escape or cancelled — reset button if no polygon was committed
    if(!drawPolygon){
      _drawHandler=null;
      document.getElementById('draw-btn').style.background='';
      document.getElementById('draw-btn').textContent='✏️ Draw';
    }
  });
  map.on('draw:deleted',function(){
    drawPolygon=null;
    _drawHandler=null;
    document.getElementById('draw-btn').style.background='';
    document.getElementById('draw-btn').textContent='✏️ Draw';
    applyFilters();
  });
}

  activeStatus=s;
  document.querySelectorAll('.pill').forEach(p=>{
    p.style.opacity=p===el?'1':'0.5';
  });
  el.style.opacity='1';

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const beds=document.getElementById('beds-filter').value;
  const zip=document.getElementById('zip-filter').value;
  const price=document.getElementById('price-filter').value;
  const sort=document.getElementById('sort-sel').value;

  filtered=D.filter(p=>{
    if(activeStatus!=='all'&&p.s!==activeStatus) return false;
    if(beds&&p.b!==beds) return false;
    if(zip&&p.z!==zip) return false;
    const nbhd=document.getElementById('nbhd-filter').value;
    if(nbhd&&p.sub!==nbhd) return false;
    if(drawPolygon){
      if(!p.lat||!p.lng) return false; // no geo = can't confirm inside polygon, exclude
      if(!isPointInPolygon([p.lat,p.lng],drawPolygon)) return false;
    }
    if(price){
      const [mn,mx]=price.split('-').map(Number);
      const pv=p.p||0;
      if(pv<mn||pv>mx) return false;
    }
    if(q){
      const hay=(p.a+' '+(p.z||'')+' '+(p.sub||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  // Sort
  if(sort==='price-high') filtered.sort((a,b)=>(b.p||0)-(a.p||0));
  else if(sort==='price-low') filtered.sort((a,b)=>(a.p||0)-(b.p||0));
  else if(sort==='dom') filtered.sort((a,b)=>(a.dom||999)-(b.dom||999));
  else filtered.sort((a,b)=>{
    const da=new Date(a.sd||a.ld||'2000-01-01');
    const db=new Date(b.sd||b.ld||'2000-01-01');
    return db-da;
  });

  renderList(filtered.slice(0,150));
  renderMap(filtered);
  document.getElementById('result-count').textContent=filtered.length.toLocaleString()+' results';
}

function setCompRadius(r, pid){
  _compRadius=r;

  if(_cmaMode){

}

// ── COMPS — 3-tier: Sold / Market Pulse (Under Contract) / Current Competition (Active) ──
function haversine(lat1,lng1,lat2,lng2){
  const R=3959;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

let _compRadius=0.5; // default radius in miles

function findCompsByTier(p, radiusMi){
  if(!p.lat||!p.lng) return {sold:[],contract:[],active:[]};
  const subjectAddr=p.a.split('#')[0].trim().toLowerCase();
  const r=radiusMi||_compRadius;

  function buildPool(statusFilter){
    const seen=new Set();
    let pool=D
      .filter(c=>{
        if(c.id===p.id) return false;
        if(!c.lat||!c.lng) return false;
        if(c.b!==p.b) return false; // same beds
        if(!statusFilter(c.s)) return false;
        if(c.a.split('#')[0].trim().toLowerCase()===subjectAddr) return false;
        const key=c.a.trim().toLowerCase()+'|'+(c.u||'');
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      })
      .map(c=>Object.assign({},c,{distNum:haversine(p.lat,p.lng,c.lat,c.lng)}))
      .filter(c=>c.distNum<=r)
      .sort((a,b)=>a.distNum-b.distNum)
      .slice(0,3);

    // Fallback: widen to 1.5mi if 0 results at chosen radius
    if(!pool.length && r < 1.5){
      const seen2=new Set();
      pool=D
        .filter(c=>{
          if(c.id===p.id||!c.lat||!c.lng) return false;
          if(c.b!==p.b||!statusFilter(c.s)) return false;
          if(c.a.split('#')[0].trim().toLowerCase()===subjectAddr) return false;
          const key=c.a.trim().toLowerCase()+'|'+(c.u||'');
          if(seen2.has(key)) return false;
          seen2.add(key);
          return true;
        })
        .map(c=>Object.assign({},c,{distNum:haversine(p.lat,p.lng,c.lat,c.lng)}))
        .filter(c=>c.distNum<=1.5)
        .sort((a,b)=>a.distNum-b.distNum)
        .slice(0,3);
    }
    return pool;
  }

  return {
    sold:     buildPool(s=>s==='Closed'),
    contract: buildPool(s=>s==='ActiveUnderContract'||s==='Pending'),
    active:   buildPool(s=>s==='Active'||s==='ComingSoon'),
  };
}

    <div class="comp-empty">None found nearby</div>`;
  return `

// ── NEAR ME ──
function isPointInPolygon(point,layer){
  // Rectangle: use bounds directly
  if(layer instanceof L.Rectangle) return layer.getBounds().contains([point[0],point[1]]);
  // Quick bounds pre-check
  if(layer.getBounds&&!layer.getBounds().contains([point[0],point[1]])) return false;
  // Unwrap Leaflet.draw polygon coords (doubly nested: [[latlng,...]])
  let raw=layer.getLatLngs?layer.getLatLngs():[];
  let verts=raw[0]||[];
  if(verts[0]&&Array.isArray(verts[0])) verts=verts[0]; // handle triple nesting
  if(!verts.length) return false;
  // Ray casting along lng axis (correct orientation)
  const lat=point[0],lng=point[1];
  let inside=false;
  for(let i=0,j=verts.length-1;i<verts.length;j=i++){
    const iLat=verts[i].lat,iLng=verts[i].lng,jLat=verts[j].lat,jLng=verts[j].lng;
    if(((iLng>lng)!==(jLng>lng))&&(lat<(jLat-iLat)*(lng-iLng)/(jLng-iLng)+iLat)) inside=!inside;
  }
  return inside;
}

// Shared color scale: blue → orange → red
function heatColor(t, alpha){
  alpha = alpha||0.55;
  let r,g,b;
  if(t<0.5){
    const t2=t*2;
    r=Math.round(10+t2*220);
    g=Math.round(147-t2*100);
    b=Math.round(160+t2*40);
  } else {
    const t2=(t-0.5)*2;
    r=Math.round(230+t2*25);
    g=Math.round(47-t2*47);
    b=Math.round(200-t2*200);
  }
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

// ── ZIP CHOROPLETH — fetches dc-zip-boundaries.json (same origin, no CORS) ──
function renderZipChoropleth(){
  if(zipLayer){map.removeLayer(zipLayer);zipLayer=null;}

  const zipData={};
  D.forEach(p=>{
    if(!p.z||!p.p) return;
    if(!zipData[p.z]) zipData[p.z]={sum:0,count:0};
    zipData[p.z].sum+=p.p;
    zipData[p.z].count++;
  });
  const avgs={};
  let prices=[];
  Object.entries(zipData).forEach(([z,d])=>{
    avgs[z]=d.sum/d.count;
    prices.push(avgs[z]);
  });
  if(!prices.length) return;
  const minP=Math.min(...prices), maxP=Math.max(...prices);
  showHeatLegend(minP,maxP);

  function paintGeoJSON(geojson){
    const layers=[];
    geojson.features.forEach(f=>{
      const zip=(f.properties.ZIP||'').toString();
      if(!avgs[zip]) return;
      const t=(avgs[zip]-minP)/(maxP-minP||1);
      const poly=L.geoJSON(f,{
        style:{color:'rgba(255,255,255,0.35)',weight:1.5,fillColor:heatColor(t,0.5),fillOpacity:0.55}
      }).bindTooltip('ZIP '+zip+'<br>Avg: $'+Math.round(avgs[zip]/1000)+'K',
        {permanent:false,className:'zip-tip',sticky:true});
      layers.push(poly);
    });
    if(layers.length) zipLayer=L.layerGroup(layers).addTo(map);
  }

  // Same-origin fetch — no CORS, works from Vercel
  fetch('dc-zip-boundaries.json')
    .then(r=>{ if(!r.ok) throw new Error('missing'); return r.json(); })
    .then(geo=>paintGeoJSON(geo))

// ── RADIUS HEAT (circle blobs by ZIP centroid) ──
function renderRadiusHeat(){
  if(zipLayer){map.removeLayer(zipLayer);zipLayer=null;}

  const zipData={};
  D.forEach(p=>{
    if(!p.z||!p.p) return;
    if(!zipData[p.z]){zipData[p.z]={sum:0,count:0,lats:[],lngs:[]};}
    zipData[p.z].sum+=p.p;
    zipData[p.z].count++;
    if(p.lat)zipData[p.z].lats.push(p.lat);
    if(p.lng)zipData[p.z].lngs.push(p.lng);
  });
  const avgs=Object.entries(zipData).map(([z,d])=>({zip:z,avg:d.sum/d.count,lats:d.lats,lngs:d.lngs}));
  if(!avgs.length) return;
  const prices=avgs.map(a=>a.avg);
  const minP=Math.min(...prices), maxP=Math.max(...prices);
  showHeatLegend(minP,maxP);

  const layers=[];
  avgs.forEach(({zip,avg,lats,lngs})=>{
    if(!lats.length) return;
    const clat=lats.reduce((a,b)=>a+b,0)/lats.length;
    const clng=lngs.reduce((a,b)=>a+b,0)/lngs.length;
    const t=(avg-minP)/(maxP-minP||1);
    const color=heatColor(t,0.55);
    const circle=L.circle([clat,clng],{
      radius:1400, color:'transparent', fillColor:color, fillOpacity:0.6,
    }).bindTooltip('ZIP '+zip+'<br>Avg: $'+Math.round(avg/1000)+'K',{permanent:false,className:'zip-tip'});
    layers.push(circle);
  });
  zipLayer=L.layerGroup(layers).addTo(map);
}

function nearMe(){
  if(!navigator.geolocation)return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    map.setView([lat,lng],14);
    L.marker([lat,lng],{
      icon:L.divIcon({
        className:'',
        html:'<div style="width:14px;height:14px;border-radius:50%;background:#f0a500;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>',
        iconSize:[14,14],iconAnchor:[7,7]
      })
    }).addTo(markerLayer).bindPopup('You are here').openPopup();
  },()=>alert('Unable to get your location'));
}

// ── TOGGLE LIST ──
function toggleList(){
  const panel=document.getElementById('list-panel');
  listVisible=!listVisible;
  panel.style.display=listVisible?'block':'none';
}

// ════════════════════════════════════════════════
// ── CMA EDITOR ──
// ════════════════════════════════════════════════
let _cmaMode=false;
let _cmaSubject=null;           // subject property object
let _cmaSlots={                 // 3 slots per tier
  sold:    [null,null,null],
  contract:[null,null,null],
  active:  [null,null,null]
};
let _replaceState=null;         // {tier, idx} when replace mode active

function cmaTierForStatus(s){
  if(s==='Closed')                               return 'sold';
  if(s==='ActiveUnderContract'||s==='Pending')   return 'contract';
  if(s==='Active'||s==='ComingSoon')             return 'active';
  return 'sold';
}

// ── Enter CMA mode from currently open detail property ──
function startCmaMode(){
  if(!_cmaSubject) return; // safety — button only shown when _cmaSubject set
  _cmaMode=true;
  cancelReplaceMode();

  // Pre-populate slots from the already-computed nearby comps
  const tiers=findCompsByTier(_cmaSubject, _compRadius);
  _cmaSlots.sold    = padSlots(tiers.sold,    3);
  _cmaSlots.contract= padSlots(tiers.contract, 3);
  _cmaSlots.active  = padSlots(tiers.active,   3);

  document.getElementById('start-cma-btn').classList.add('cma-active');
  document.getElementById('start-cma-btn').textContent='📋 Editing CMA';

  // Show nav badge
  document.getElementById('cma-nav-badge').style.display='block';

  renderDetailBody(_cmaSubject);
  updateCmaBadge();
}

function exitCmaMode(){
  _cmaMode=false;
  cancelReplaceMode();
  _cmaSlots={sold:[null,null,null],contract:[null,null,null],active:[null,null,null]};
  const btn=document.getElementById('start-cma-btn');
  if(btn){ btn.classList.remove('cma-active'); btn.textContent='📋 Start CMA'; }
  document.getElementById('cma-nav-badge').style.display='none';
  if(_cmaSubject) renderDetailBody(_cmaSubject);
}

function padSlots(arr, n){
  const out=arr.slice(0,n).map(x=>x||null);
  while(out.length<n) out.push(null);
  return out;
}

// ── Replace mode: user clicks a tier/slot's Replace button ──
function activateReplaceMode(tier, idx){
  // Toggle off if already this slot
  if(_replaceState&&_replaceState.tier===tier&&_replaceState.idx===idx){
    cancelReplaceMode();
    return;
  }
  _replaceState={tier,idx};
  document.getElementById('replace-hint').style.display='block';
  renderCmaSlots(); // re-render to highlight the active slot
}

function cancelReplaceMode(){
  _replaceState=null;
  document.getElementById('replace-hint').style.display='none';
  if(_cmaMode) renderCmaSlots();
}

// Called from map pin click when replace mode is active
function handleReplacePickFromMap(p){
  if(!_replaceState) return false;
  const {tier,idx}=_replaceState;
  // Don't allow placing subject in a comp slot
  if(_cmaSubject&&p.id===_cmaSubject.id){ cancelReplaceMode(); return true; }
  _cmaSlots[tier][idx]=p;
  cancelReplaceMode();
  renderDetailBody(_cmaSubject);
  updateCmaBadge();
  return true;
}

function removeFromSlot(tier, idx){
  _cmaSlots[tier][idx]=null;
  cancelReplaceMode();
  renderCmaSlots();
  updateCmaBadge();
}

function updateCmaBadge(){
  let count=0;
  ['sold','contract','active'].forEach(t=>_cmaSlots[t].forEach(s=>{ if(s) count++; }));
  document.getElementById('cma-badge-count').textContent=count+' comp'+(count!==1?'s':'');
}

// ── Render CMA slots only (called on remove/replace without full re-render) ──
function renderCmaSlots(){
  const wrap=document.getElementById('cma-slots-wrap');
  if(!wrap) return;
  wrap.innerHTML=buildCmaSlotsHTML();
  updateCmaSummaryStats();
}

function buildCmaSlotsHTML(){
  const tierDefs=[
    {key:'sold',     cls:'sold-slot',     tierCls:'sold',     label:'● SOLD — BASELINE'},
    {key:'contract', cls:'contract-slot', tierCls:'contract', label:'◆ MARKET PULSE — UNDER CONTRACT'},
    {key:'active',   cls:'active-slot',   tierCls:'active',   label:'▲ CURRENT COMPETITION — ACTIVE'},
  ];
  return tierDefs.map(({key,cls,tierCls,label})=>`
    <div class="comp-tier-header">
      <span class="comp-tier-label ${tierCls}">${label}</span>
      <div class="comp-tier-line"></div>
    </div>
    ${_cmaSlots[key].map((slot,i)=>{
      const isReplacing=_replaceState&&_replaceState.tier===key&&_replaceState.idx===i;
      const slotId='cma-slot-'+key+'-'+i;
      if(slot){
        return `
        <div class="cma-comp-slot ${cls}${isReplacing?' replacing':''}" id="${slotId}">
          <div class="cma-slot-content" onclick="toggleSlotPreview('${slotId}')">
            <div class="cma-slot-info">
              <div class="cma-slot-addr">${slot.a}</div>
              <div class="cma-slot-meta">${slot.z||''} · ${statusLabel(slot.s)}${slot.distNum?' · '+slot.distNum.toFixed(2)+' mi':''}</div>
            </div>
            <div class="cma-slot-price">${fmt(slot.sp||slot.p)}</div>
          </div>
          <div class="cma-slot-preview" id="${slotId}-preview">
            <div class="cma-slot-preview-grid">
              <div class="cma-preview-field"><div class="lbl">Beds</div><div class="val">${slot.b||'—'}</div></div>
              <div class="cma-preview-field"><div class="lbl">Baths</div><div class="val">${slot.ba||'—'}</div></div>
              <div class="cma-preview-field"><div class="lbl">Sqft</div><div class="val">${slot.sf?slot.sf.toLocaleString():'—'}</div></div>
              <div class="cma-preview-field"><div class="lbl">DOM</div><div class="val">${slot.dom||'—'}</div></div>
              <div class="cma-preview-field"><div class="lbl">List Price</div><div class="val">${fmt(slot.op)}</div></div>
              <div class="cma-preview-field"><div class="lbl">Sold Price</div><div class="val">${fmt(slot.sp||slot.p)}</div></div>
            </div>
            ${slot.lat&&slot.lng?`<button class="cma-slot-pan-btn" onclick="panToComp(${slot.lat},${slot.lng})">📍 Pan map to this property</button>`:''}
          </div>
          <div class="cma-slot-actions">
            <button class="cma-slot-act-btn remove" onclick="removeFromSlot('${key}',${i})">✕ Remove</button>
            <button class="cma-slot-act-btn replace${isReplacing?' active':''}" onclick="activateReplaceMode('${key}',${i})">${isReplacing?'⏹ Cancel':'🔄 Replace'}</button>
          </div>
        </div>`;
      } else {
        return `
        <div class="cma-empty-slot${isReplacing?' replacing':''}">
          <span class="cma-empty-slot-text">${isReplacing?'👆 Click a map pin to fill this slot':'+ Empty slot'}</span>
        </div>`;
      }
    }).join('')}
  `).join('');
}

function toggleSlotPreview(slotId){
  const preview=document.getElementById(slotId+'-preview');
  if(!preview) return;
  // Close any other open previews first
  document.querySelectorAll('.cma-slot-preview.open').forEach(el=>{
    if(el!==preview) el.classList.remove('open');
  });
  preview.classList.toggle('open');
}

function panToComp(lat,lng){
  if(map) map.panTo([lat,lng]);
}

function updateCmaSummaryStats(){
  const all=[];
  ['sold','contract','active'].forEach(t=>_cmaSlots[t].forEach(s=>{ if(s) all.push(s.sp||s.p||0); }));
  const cntEl=document.getElementById('cma-sum-count');
  const avgEl=document.getElementById('cma-sum-avg');
  const rngEl=document.getElementById('cma-sum-range');
  if(!cntEl) return;
  if(!all.length){
    cntEl.textContent='0'; avgEl.textContent='—'; rngEl.textContent='—';
    return;
  }
  const avg=all.reduce((a,b)=>a+b,0)/all.length;
  cntEl.textContent=all.length;
  avgEl.textContent='$'+Math.round(avg/1000)+'K';
  rngEl.textContent='$'+Math.round(Math.min(...all)/1000)+'K – $'+Math.round(Math.max(...all)/1000)+'K';
}

// ── Render the full det-body (normal view or CMA mode) ──
function renderDetailBody(p){
  const tiers=findCompsByTier(p, _compRadius);
  if(_cmaMode){
    document.getElementById('det-body').innerHTML=`
      <div class="cma-mode-banner">

        <button class="cma-back-btn" onclick="exitCmaMode()">← Back to Details</button>

      <div class="det-section">

          <div class="det-field"><div class="lbl">Bathrooms</div><div class="val">${p.ba||'—'}</div></div>

          <div class="det-field"><div class="lbl">Days on Market</div><div class="val">${p.dom||'—'}</div></div>

        </div>
      </div>

      <div class="det-section">
        <div class="det-section-title">Comps — Radius
          <span style="float:right;display:flex;gap:4px">
            ${[0.25,0.5,1].map(r=>`<button class="comp-radius-btn${_compRadius===r?' active':''}" onclick="setCompRadius(${r},'${p.id}')" style="padding:3px 8px;font-size:10px">${r} mi</button>`).join('')}

        </div>

      </div>

      <div class="cma-summary-block">
        <div class="cma-summary-stats">

          <div class="cma-sum-stat"><div class="val" id="cma-sum-avg">—</div><div class="lbl">Avg Price</div></div>

      </div>`;
    updateCmaSummaryStats();
  } else {
    // Normal detail view (unchanged)
    document.getElementById('det-body').innerHTML=`
    <div class="det-section">
      <div class="det-section-title">Property Details</div>
      <div class="det-grid">
        <div class="det-field"><div class="lbl">Bedrooms</div><div class="val">${p.b||'—'}</div></div>
        <div class="det-field"><div class="lbl">Bathrooms</div><div class="val">${p.ba||'—'}</div></div>
        <div class="det-field"><div class="lbl">Sq Footage</div><div class="val">${p.sf?p.sf.toLocaleString():'—'}</div></div>
        <div class="det-field"><div class="lbl">Status</div><div class="val">${statusLabel(p.s)}</div></div>
        <div class="det-field"><div class="lbl">Days on Market</div><div class="val">${p.dom||'—'}</div></div>
        <div class="det-field"><div class="lbl">Year Built</div><div class="val">${p.yr||'—'}</div></div>
        <div class="det-field"><div class="lbl">List Price</div><div class="val">${fmt(p.op)}</div></div>
        <div class="det-field"><div class="lbl">Sold Price</div><div class="val">${fmt(p.sp)}</div></div>
        ${p.hoa?`<div class="det-field"><div class="lbl">HOA/Month</div><div class="val">${fmt(p.hoa)}</div></div>`:''}
        <div class="det-field"><div class="lbl">Settled Date</div><div class="val">${p.sd||'—'}</div></div>
        <div class="det-field"><div class="lbl">MLS #</div><div class="val" style="font-size:11px">${p.n||'—'}</div></div>

      </div>
    </div>

    ${p.ag?`

// ── Copy comps to clipboard ──
function copyCompsList(){
  const p=_cmaSubject;
  if(!p) return;
  const lines=[];
  lines.push('CMA COMP ANALYSIS — AgentEdge SaleComps');
  lines.push('=========================================');
  lines.push('SUBJECT PROPERTY');
  lines.push((p.a||'—')+', Washington DC '+(p.z||''));
  lines.push('Price: '+fmt(p.sp||p.p)+' | Status: '+statusLabel(p.s));
  lines.push('Beds: '+(p.b||'—')+' | Baths: '+(p.ba||'—')+' | Sqft: '+(p.sf?p.sf.toLocaleString():'—'));
  lines.push('');
  const tierDefs=[
    {key:'sold',    label:'SOLD — BASELINE'},
    {key:'contract',label:'UNDER CONTRACT — MARKET PULSE'},
    {key:'active',  label:'ACTIVE — CURRENT COMPETITION'},
  ];
  tierDefs.forEach(({key,label})=>{
    const filled=_cmaSlots[key].filter(Boolean);
    if(!filled.length) return;
    lines.push(label);
    lines.push('-'.repeat(label.length));
    filled.forEach((c,i)=>{
      lines.push(`${i+1}. ${c.a}, DC ${c.z||''}`);
      lines.push(`   Price: ${fmt(c.sp||c.p)} | ${statusLabel(c.s)} | ${c.b||'—'} bed / ${c.ba||'—'} bath${c.sf?' / '+c.sf.toLocaleString()+' sqft':''}${c.dom?' | '+c.dom+' DOM':''}`);
    });
    lines.push('');
  });
  const all=[];
  ['sold','contract','active'].forEach(t=>_cmaSlots[t].forEach(s=>{ if(s) all.push(s.sp||s.p||0); }));
  if(all.length){
    const avg=all.reduce((a,b)=>a+b,0)/all.length;
    lines.push('SUMMARY');
    lines.push('Comps selected: '+all.length);
    lines.push('Average price: '+fmt(avg));
    lines.push('Price range: '+fmt(Math.min(...all))+' – '+fmt(Math.max(...all)));
    lines.push('');
  }
  lines.push('Generated by AgentEdge SaleComps · '+new Date().toLocaleDateString());
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn=document.querySelector('.cma-act-copy');
    if(!btn) return;
    const orig=btn.textContent;
    btn.textContent='✓ Copied!';
    btn.style.background='var(--green)';
    setTimeout(()=>{ btn.textContent=orig; btn.style.background=''; },2000);
  }).catch(()=>alert('Copy failed — try again'));
}
