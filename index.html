<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AgentEdge SaleComps — DC Sales Database v11</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<style>
:root {
  --navy: #0a1628;
  --navy-mid: #112240;
  --navy-light: #1a3a5c;
  --gold: #f0a500;
  --gold-light: #f7c948;
  --white: #ffffff;
  --off-white: #f4f6f9;
  --gray: #8892a4;
  --gray-light: #e8ecf2;
  --text: #1a2332;
  --green: #00c48c;
  --amber: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --card-shadow: 0 4px 24px rgba(10,22,40,0.12);
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--white);
  height: 100vh;
  overflow: hidden;
}

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 50%, #0d1f3c 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 0;
}
.login-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(240,165,0,0.2);
  border-radius: 20px;
  padding: 48px 40px;
  width: 360px;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .brand {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.5px;
}
.login-logo .brand span { color: var(--gold); }
.login-logo .sub {
  font-size: 12px;
  color: var(--gray);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}
.login-card input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--white);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
.login-card input:focus { border-color: var(--gold); }
.login-card input::placeholder { color: var(--gray); }
.login-btn {
  width: 100%;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.5px;
}
.login-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.login-error {
  color: #ef4444;
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

/* ── APP LAYOUT ── */
#app { display: none; height: 100vh; flex-direction: column; }

/* ── TOP NAV ── */
.topnav {
  background: var(--navy);
  border-bottom: 1px solid rgba(240,165,0,0.15);
  padding: 0 16px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 100;
}
.nav-brand {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}
.nav-brand span { color: var(--gold); }
.nav-brand .product {
  font-size: 11px;
  font-weight: 400;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: block;
  margin-top: -3px;
}
.nav-stats {
  display: flex;
  gap: 20px;
  align-items: center;
}
.nav-stat {
  text-align: center;
  cursor: default;
}
.nav-stat .val {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.nav-stat .lbl {
  font-size: 9px;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── SEARCH BAR ── */
.searchbar-wrap {
  background: var(--navy-mid);
  padding: 10px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.search-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.search-input-wrap {
  flex: 1;
  position: relative;
}
.search-input-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 10px 14px 10px 36px;
  color: var(--white);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-input-wrap input:focus { border-color: var(--gold); }
.search-input-wrap input::placeholder { color: var(--gray); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray);
  font-size: 14px;
}
.near-me-btn {
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Syne', sans-serif;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.near-me-btn:hover { background: var(--gold-light); }
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.fsel {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--white);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 10px;
  outline: none;
  cursor: pointer;
  white-space: nowrap;
  appearance: none;
  -webkit-appearance: none;
}
.fsel:focus { border-color: var(--gold); }
.status-pills {
  display: flex;
  gap: 6px;
}
.pill {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.3px;
}
.pill.all { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.pill.active-pill { background: rgba(0,196,140,0.15); color: var(--green); border-color: var(--green); }
.pill.closed-pill { background: rgba(239,68,68,0.15); color: var(--red); border-color: var(--red); }
.pill.contract-pill { background: rgba(245,158,11,0.15); color: var(--amber); border-color: var(--amber); }
.pill.pending-pill { background: rgba(139,92,246,0.15); color: var(--purple); border-color: var(--purple); }
.pill.soon-pill { background: rgba(59,130,246,0.15); color: var(--blue); border-color: var(--blue); }
.pill:not(.all):not(.active-pill):not(.closed-pill):not(.contract-pill):not(.pending-pill):not(.soon-pill) {
  background: rgba(255,255,255,0.07);
  color: var(--gray);
  border-color: rgba(255,255,255,0.1);
}

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── LIST PANEL ── */
#list-panel {
  width: 320px;
  background: var(--off-white);
  overflow-y: auto;
  flex-shrink: 0;
  border-right: 1px solid var(--gray-light);
}
.list-header {
  padding: 12px 14px;
  background: var(--white);
  border-bottom: 1px solid var(--gray-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.list-header .count {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-family: 'Syne', sans-serif;
}
.sort-sel {
  background: transparent;
  border: none;
  font-size: 12px;
  color: var(--gray);
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  outline: none;
}

/* ── PROPERTY CARDS ── */
.prop-card {
  background: var(--white);
  border-bottom: 1px solid var(--gray-light);
  padding: 14px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.prop-card:hover { background: #f0f4fa; }
.prop-card.selected { background: #e8f0fe; border-left: 3px solid var(--gold); }
.card-addr {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  font-family: 'Syne', sans-serif;
}
.card-sub {
  font-size: 11px;
  color: var(--gray);
  margin-bottom: 8px;
}
.card-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  font-family: 'Syne', sans-serif;
  margin-bottom: 6px;
}
.card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.3px;
}
.tag-beds { background: var(--navy); color: var(--white); }
.tag-status-Active { background: rgba(0,196,140,0.15); color: #00a876; }
.tag-status-Closed { background: rgba(239,68,68,0.12); color: #dc2626; }
.tag-status-ActiveUnderContract { background: rgba(245,158,11,0.15); color: #d97706; }
.tag-status-Pending { background: rgba(139,92,246,0.15); color: #7c3aed; }
.tag-status-ComingSoon { background: rgba(59,130,246,0.15); color: #2563eb; }
.tag-sqft { background: var(--gray-light); color: var(--gray); }
.tag-dom { background: var(--gray-light); color: var(--gray); }

/* ── MAP ── */
#map {
  flex: 1;
  z-index: 1;
}
.leaflet-container { background: #e8ecf2 !important; }

/* ── FLOATING MAP BUTTONS ── */
.map-controls {
  position: absolute;
  right: 12px;
  top: 12px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.map-btn {
  background: var(--navy);
  border: 1px solid rgba(240,165,0,0.3);
  border-radius: 10px;
  color: var(--white);
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  font-family: 'Syne', sans-serif;
  transition: all 0.15s;
  min-width: 56px;
  letter-spacing: 0.3px;
}
.map-btn:hover { background: var(--navy-light); border-color: var(--gold); }
.map-btn .ico { font-size: 16px; display: block; margin-bottom: 2px; }

/* ── DETAIL PANEL ── */
#detail-panel {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 380px;
  background: var(--white);
  z-index: 600;
  overflow-y: auto;
  box-shadow: -8px 0 32px rgba(10,22,40,0.2);
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#detail-panel.open { transform: translateX(0); }
.det-header {
  background: var(--navy);
  padding: 20px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.det-close {
  position: absolute;
  right: 16px;
  top: 16px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: var(--white);
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.det-close:hover { background: rgba(255,255,255,0.2); }
.det-addr {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 4px;
  padding-right: 40px;
}
.det-sub {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.det-status-label {
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.det-price {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--gold);
  line-height: 1;
}
.det-body { padding: 20px; }
.det-section {
  margin-bottom: 24px;
}
.det-section-title {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--gray-light);
}
.det-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.det-field {
  background: var(--off-white);
  border-radius: 8px;
  padding: 10px 12px;
}
.det-field .lbl {
  font-size: 10px;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 3px;
}
.det-field .val {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  font-family: 'Syne', sans-serif;
}

/* ── COMPS ── */
.comp-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--off-white);
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.comp-item:hover { background: var(--gray-light); }
.comp-addr { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; }
.comp-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
.comp-price { font-size: 14px; font-weight: 700; color: var(--navy); font-family: 'Syne', sans-serif; white-space: nowrap; margin-left: 12px; }

/* ── AGENT CARD ── */
.agent-card {
  background: var(--navy);
  border-radius: 10px;
  padding: 14px;
  color: var(--white);
}
.agent-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}
.agent-office {
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 10px;
}
.agent-phone {
  font-size: 13px;
  color: var(--gray);
}

/* ── LEGEND ── */
.map-legend {
  position: absolute;
  bottom: 24px;
  left: 328px;
  background: var(--navy);
  border: 1px solid rgba(240,165,0,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  z-index: 500;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--gray);
  font-family: 'DM Sans', sans-serif;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  #list-panel { display: none; }
  #detail-panel { width: 100%; }
  .map-legend { left: 12px; }
  .nav-stats { gap: 12px; }
  .nav-stat .val { font-size: 13px; }
}

/* ── EMPTY STATE ── */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--gray);
}
.empty-state .ico { font-size: 32px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── SCROLLBAR ── */
#list-panel::-webkit-scrollbar { width: 4px; }
#list-panel::-webkit-scrollbar-track { background: transparent; }
#list-panel::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 2px; }
#detail-panel::-webkit-scrollbar { width: 4px; }
#detail-panel::-webkit-scrollbar-track { background: transparent; }
#detail-panel::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 2px; }

.zip-tip{background:rgba(13,27,42,0.9);color:#fff;border:none;border-radius:6px;font-size:.75rem;padding:4px 8px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">Agent<span>Edge</span></div>
      <div class="sub">SaleComps · DC Metro</div>
    </div>
    <input type="password" id="pw-input" placeholder="Enter password" />
    <button class="login-btn" onclick="tryLogin()">Access Platform</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOP NAV -->
  <div class="topnav">
    <div class="nav-brand">
      Agent<span>Edge</span>
      <span class="product">SaleComps · DC</span>
    </div>
    <div class="nav-stats">
      <div class="nav-stat">
        <div class="val">16,635</div>
        <div class="lbl">Total</div>
      </div>
      <div class="nav-stat">
        <div class="val">13,486</div>
        <div class="lbl">Sold</div>
      </div>
      <div class="nav-stat">
        <div class="val">2,126</div>
        <div class="lbl">Active</div>
      </div>
      <div class="nav-stat">

  <!-- SEARCH BAR -->

      </div>

        <span class="pill contract-pill" onclick="setStatus('ActiveUnderContract',this)">Under Contract</span>
        <span class="pill pending-pill" onclick="setStatus('Pending',this)">Pending</span>
        <span class="pill soon-pill" onclick="setStatus('ComingSoon',this)">Coming Soon</span>
      </div>
      <select class="fsel" id="beds-filter" onchange="applyFilters()">
        <option value="">All Beds</option>

        <option value="1">1 Bed</option>
        <option value="2">2 Bed</option>
        <option value="3+">3+ Bed</option>
      </select>
      <select class="fsel" id="zip-filter" onchange="applyFilters()">

        <option value="20001">20001</option><option value="20002">20002</option><option value="20003">20003</option><option value="20004">20004</option><option value="20005">20005</option><option value="20006">20006</option><option value="20007">20007</option><option value="20008">20008</option><option value="20009">20009</option><option value="20010">20010</option><option value="20011">20011</option><option value="20012">20012</option><option value="20015">20015</option><option value="20016">20016</option><option value="20017">20017</option><option value="20018">20018</option><option value="20019">20019</option><option value="20020">20020</option><option value="20024">20024</option><option value="20032">20032</option><option value="20036">20036</option><option value="20037">20037</option>
      </select>
      <select class="fsel" id="nbhd-filter" onchange="applyFilters()">
        <option value="">All Neighborhoods</option>
        <option value="14TH STREET CORRIDOR">14Th Street Corridor</option>
<option value="16TH STREET HEIGHTS">16Th Street Heights</option>
<option value="ADAMS MORGAN">Adams Morgan</option>
<option value="AMERICAN UNIVERSITY PARK">American University Park</option>
<option value="ANACOSTIA">Anacostia</option>
<option value="BARNABY WOODS">Barnaby Woods</option>
<option value="BARRY FARMS">Barry Farms</option>
<option value="BELLEVUE">Bellevue</option>
<option value="BERKLEY">Berkley</option>
<option value="BLOOMINGDALE">Bloomingdale</option>
<option value="BRENTWOOD">Brentwood</option>

<script>
// ── DATA ──
let D=[];
let _dataLoaded=false;
let markers={};
let map,markerLayer;
let activeStatus='all';
let selectedId=null;
let listVisible=true;

// ── LOGIN ──
function tryLogin(){
  const pw=document.getElementById('pw-input').value;
  if(pw==='agentedge2025'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    initMap();
    fetch('salecomps-data.json')
      .then(r=>r.json())
      .then(data=>{D=data;_dataLoaded=true;applyFilters();})
      .catch(e=>console.error('Data load failed:',e));
  } else {
    document.getElementById('login-err').textContent='Incorrect password';
    document.getElementById('pw-input').value='';
  }
}
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});

// ── STATUS COLORS ──
function statusColor(s){
  if(s==='Active') return '#00c48c';
  if(s==='Closed') return '#ef4444';
  if(s==='ActiveUnderContract') return '#f59e0b';
  if(s==='Pending') return '#8b5cf6';
  if(s==='ComingSoon') return '#3b82f6';
  return '#8892a4';
}

function statusLabel(s){
  if(s==='Active') return 'Active';
  if(s==='Closed') return 'Sold';
  if(s==='ActiveUnderContract') return 'Under Contract';
  if(s==='Pending') return 'Pending';
  if(s==='ComingSoon') return 'Coming Soon';
  return s;
}

// ── MAP ──
function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([38.9072,-77.0369],12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);

  // Draw control
  drawnItems=L.featureGroup().addTo(map);
  drawControl=new L.Control.Draw({
    draw:{polygon:{shapeOptions:{color:'#0a9396',weight:2,fillOpacity:0.1}},rectangle:{shapeOptions:{color:'#0a9396',weight:2,fillOpacity:0.1}},circle:false,marker:false,circlemarker:false,polyline:false},
    edit:{featureGroup:drawnItems,remove:true}
  });
  drawControl.addTo(map);
  // Hide the Leaflet toolbar — we drive drawing via L.Draw.Polygon API directly
  setTimeout(function(){
    const tb=document.querySelector('.leaflet-draw');
    if(tb) tb.style.display='none';
  },300);

  map.on('draw:created',function(e){
    drawnItems.clearLayers();
    drawnItems.addLayer(e.layer);
    drawPolygon=e.layer;
    _drawHandler=null;
    document.getElementById('draw-btn').style.background='#ee9b00';
    document.getElementById('draw-btn').textContent='✏️ Clear';
    applyFilters();
  });
  map.on('draw:drawstop',function(){
    // User pressed Escape or cancelled — reset button if no polygon was committed
    if(!drawPolygon){
      _drawHandler=null;
      document.getElementById('draw-btn').style.background='';
      document.getElementById('draw-btn').textContent='✏️ Draw';
    }
  });
  map.on('draw:deleted',function(){
    drawPolygon=null;
    _drawHandler=null;
    document.getElementById('draw-btn').style.background='';
    document.getElementById('draw-btn').textContent='✏️ Draw';
    applyFilters();
  });
}

function makeIcon(color){
  return L.divIcon({
    className:'',
    html:`<div style="width:11px;height:11px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
    iconSize:[11,11],iconAnchor:[5.5,5.5]
  });
}

function renderMap(props){
  markerLayer.clearLayers();
  markers={};
  const max=3000;
  const toShow=props.filter(p=>p.lat&&p.lng).slice(0,max);
  toShow.forEach(p=>{
    const m=L.marker([p.lat,p.lng],{icon:makeIcon(statusColor(p.s))})
      .on('click',()=>showDetail(p));
    markerLayer.addLayer(m);
    markers[p.id]=m;
  });
  document.getElementById('on-map-count').textContent=toShow.length.toLocaleString();
}

// ── FILTERS ──
function setStatus(s,el){
  activeStatus=s;
  document.querySelectorAll('.pill').forEach(p=>{
    p.style.opacity=p===el?'1':'0.5';
  });
  el.style.opacity='1';
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const beds=document.getElementById('beds-filter').value;
  const zip=document.getElementById('zip-filter').value;
  const price=document.getElementById('price-filter').value;
  const sort=document.getElementById('sort-sel').value;

  filtered=D.filter(p=>{
    if(activeStatus!=='all'&&p.s!==activeStatus) return false;
    if(beds&&p.b!==beds) return false;
    if(zip&&p.z!==zip) return false;
    const nbhd=document.getElementById('nbhd-filter').value;
    if(nbhd&&p.sub!==nbhd) return false;
    if(drawPolygon){
      if(!p.lat||!p.lng) return false; // no geo = can't confirm inside polygon, exclude
      if(!isPointInPolygon([p.lat,p.lng],drawPolygon)) return false;
    }
    if(price){
      const [mn,mx]=price.split('-').map(Number);
      const pv=p.p||0;
      if(pv<mn||pv>mx) return false;
    }
    if(q){
      const hay=(p.a+' '+(p.z||'')+' '+(p.sub||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  // Sort
  if(sort==='price-high') filtered.sort((a,b)=>(b.p||0)-(a.p||0));
  else if(sort==='price-low') filtered.sort((a,b)=>(a.p||0)-(b.p||0));
  else if(sort==='dom') filtered.sort((a,b)=>(a.dom||999)-(b.dom||999));
  else filtered.sort((a,b)=>{
    const da=new Date(a.sd||a.ld||'2000-01-01');
    const db=new Date(b.sd||b.ld||'2000-01-01');
    return db-da;
  });

  renderList(filtered.slice(0,150));
  renderMap(filtered);
  document.getElementById('result-count').textContent=filtered.length.toLocaleString()+' results';
}

function onSearch(){ applyFilters(); }

// ── LIST ──
function fmt(n){
  if(!n) return '—';
  return '$'+Math.round(n).toLocaleString();
}

function renderList(props){
  const el=document.getElementById('prop-list');
  if(!props.length){
    el.innerHTML=`<div class="empty-state"><div class="ico">🏠</div><p>No properties match your filters</p></div>`;
    return;
  }
  el.innerHTML=props.map(p=>`
    <div class="prop-card${selectedId===p.id?' selected':''}" onclick="showDetail(p_${p.id})" id="card-${p.id}">
      <div class="card-addr">${p.a}</div>
      <div class="card-sub">Washington, DC ${p.z||''}${p.sub?' · '+p.sub:''}</div>
      <div class="card-price">${fmt(p.p)}</div>
      <div class="card-tags">
        <span class="tag tag-beds">${p.b||'—'} Bed</span>
        <span class="tag tag-status-${p.s}">${statusLabel(p.s)}</span>
        ${p.sf?`<span class="tag tag-sqft">${p.sf.toLocaleString()} sqft</span>`:''}
        ${p.dom?`<span class="tag tag-dom">${p.dom} DOM</span>`:''}
      </div>
    </div>
  `).join('');

  // Bind click events using data reference
  props.forEach(p=>{
    const card=document.getElementById('card-'+p.id);
    if(card) card.onclick=()=>showDetail(p);
  });
}

// ── DETAIL ──
function showDetail(p){
  selectedId=p.id;

  // Update selected card
  document.querySelectorAll('.prop-card').forEach(c=>c.classList.remove('selected'));
  const card=document.getElementById('card-'+p.id);
  if(card){card.classList.add('selected'); card.scrollIntoView({block:'nearest'});}

  // Pan map
  if(p.lat&&p.lng) map.panTo([p.lat,p.lng]);

  // Header
  // Avoid double unit: only append p.u if it's not already in p.a
  const addrDisplay=p.u&&!p.a.includes('#'+p.u)?p.a+' #'+p.u:p.a;
  document.getElementById('det-addr').textContent=addrDisplay;
  document.getElementById('det-sub').textContent='Washington, DC '+(p.z||'')+(p.sub?' · '+p.sub:'');
  document.getElementById('det-status-lbl').textContent=statusLabel(p.s);

  // Body
  const comps=findComps(p);
  document.getElementById('det-body').innerHTML=`
    <div class="det-section">
      <div class="det-section-title">Property Details</div>
      <div class="det-grid">
        <div class="det-field"><div class="lbl">Bedrooms</div><div class="val">${p.b||'—'}</div></div>
        <div class="det-field"><div class="lbl">Bathrooms</div><div class="val">${p.ba||'—'}</div></div>
        <div class="det-field"><div class="lbl">Sq Footage</div><div class="val">${p.sf?p.sf.toLocaleString():'—'}</div></div>
        <div class="det-field"><div class="lbl">Status</div><div class="val">${statusLabel(p.s)}</div></div>
        <div class="det-field"><div class="lbl">Days on Market</div><div class="val">${p.dom||'—'}</div></div>
        <div class="det-field"><div class="lbl">Year Built</div><div class="val">${p.yr||'—'}</div></div>
        <div class="det-field"><div class="lbl">List Price</div><div class="val">${fmt(p.op)}</div></div>
        <div class="det-field"><div class="lbl">Sold Price</div><div class="val">${fmt(p.sp)}</div></div>
        ${p.hoa?`<div class="det-field"><div class="lbl">HOA/Month</div><div class="val">${fmt(p.hoa)}</div></div>`:''}</div>
        <div class="det-field"><div class="lbl">Settled Date</div><div class="val">${p.sd||'—'}</div></div>
        <div class="det-field"><div class="lbl">MLS #</div><div class="val" style="font-size:11px">${p.n||'—'}</div></div>
        ${p.sty?`<div class="det-field"><div class="lbl">Style</div><div class="val">${p.sty}</div></div>`:''}

    </div>

    ${p.ag?`
    <div class="det-section">
      <div class="det-section-title">Listing Agent</div>

        <div class="agent-name">${p.ag}</div>
        <div class="agent-office">${p.off||''}</div>
        ${p.agp?`<div class="agent-phone">📞 ${p.agp}</div>`:''}
      </div>
    </div>`:''}

    <div class="det-section">
      <div class="det-section-title">Nearby Comps</div>
      ${comps.length?comps.map(c=>`
        <div class="comp-item" onclick="showDetail(D.find(x=>x.id===${c.id}))">
          <div>
            <div class="comp-addr">${c.a}</div>
            <div class="comp-meta">${c.z} · ${statusLabel(c.s)} · ${c.dist} mi away</div>
          </div>
          <div class="comp-price">${fmt(c.sp||c.p)}</div>
        </div>
      `).join(''):'<div style="color:var(--gray);font-size:13px">No nearby comps found</div>'}
    </div>
  `;

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  selectedId=null;
  document.querySelectorAll('.prop-card').forEach(c=>c.classList.remove('selected'));
}

// ── COMPS ──
function haversine(lat1,lng1,lat2,lng2){
  const R=3959;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function findComps(p){
  if(!p.lat||!p.lng) return [];
  const subjectAddr=p.a.split('#')[0].trim().toLowerCase();
  const seenUnit=new Set();

  // Build pool: same beds, Closed, has geo, different building, within 0.5mi
  let pool=D
    .filter(c=>{
      if(c.id===p.id) return false;
      if(!c.lat||!c.lng||c.b!==p.b||c.s!=='Closed') return false;
      if(c.a.split('#')[0].trim().toLowerCase()===subjectAddr) return false; // exclude same building
      const key=c.a.trim().toLowerCase()+'|'+(c.u||'');
      if(seenUnit.has(key)) return false; // deduplicate
      seenUnit.add(key);
      return true;
    })
    .map(c=>Object.assign({},c,{distNum:haversine(p.lat,p.lng,c.lat,c.lng),dist:haversine(p.lat,p.lng,c.lat,c.lng).toFixed(2)}))
    .filter(c=>c.distNum<=0.5) // cap at 0.5mi
    .sort((a,b)=>a.distNum-b.distNum);

  // Fallback: widen to 1.5mi if fewer than 3 results
  if(pool.length<3){
    const seen2=new Set();
    pool=D
      .filter(c=>{
        if(c.id===p.id) return false;
        if(!c.lat||!c.lng||c.b!==p.b||c.s!=='Closed') return false;
        if(c.a.split('#')[0].trim().toLowerCase()===subjectAddr) return false;
        const key=c.a.trim().toLowerCase()+'|'+(c.u||'');
        if(seen2.has(key)) return false;
        seen2.add(key);
        return true;
      })
      .map(c=>Object.assign({},c,{distNum:haversine(p.lat,p.lng,c.lat,c.lng),dist:haversine(p.lat,p.lng,c.lat,c.lng).toFixed(2)}))
      .filter(c=>c.distNum<=1.5)
      .sort((a,b)=>a.distNum-b.distNum);
  }

  return pool.slice(0,6);
}

// ── NEAR ME ──
function isPointInPolygon(point,layer){
  // Rectangle: use bounds directly
  if(layer instanceof L.Rectangle) return layer.getBounds().contains([point[0],point[1]]);
  // Quick bounds pre-check
  if(layer.getBounds&&!layer.getBounds().contains([point[0],point[1]])) return false;
  // Unwrap Leaflet.draw polygon coords (doubly nested: [[latlng,...]])
  let raw=layer.getLatLngs?layer.getLatLngs():[];
  let verts=raw[0]||[];
  if(verts[0]&&Array.isArray(verts[0])) verts=verts[0]; // handle triple nesting
  if(!verts.length) return false;
  // Ray casting along lng axis (correct orientation)
  const lat=point[0],lng=point[1];
  let inside=false;
  for(let i=0,j=verts.length-1;i<verts.length;j=i++){
    const iLat=verts[i].lat,iLng=verts[i].lng,jLat=verts[j].lat,jLng=verts[j].lng;
    if(((iLng>lng)!==(jLng>lng))&&(lat<(jLat-iLat)*(lng-iLng)/(jLng-iLng)+iLat)) inside=!inside;
  }
  return inside;
}

let _drawHandler=null;
function toggleDraw(){
  const btn=document.getElementById('draw-btn');
  if(drawPolygon||_drawHandler){
    // Cancel any active draw
    if(_drawHandler){_drawHandler.disable();_drawHandler=null;}
    drawnItems.clearLayers();
    drawPolygon=null;
    btn.style.background='';
    btn.textContent='✏️ Draw';
    applyFilters();
  } else {
    // Start drawing using Leaflet.Draw API directly — no .click() hack
    _drawHandler=new L.Draw.Polygon(map,{
      shapeOptions:{color:'#0a9396',weight:2,fillOpacity:0.1}
    });
    _drawHandler.enable();
    btn.style.background='#0a9396';
    btn.textContent='✏️ Drawing... (double-click to finish)';
  }
}

function toggleZipShading(){
  zipShadingOn=!zipShadingOn;
  const btn=document.getElementById('shade-btn');
  if(zipShadingOn){
    renderZipShading();
    btn.style.background='#0a9396';
    btn.textContent='🗺️ Hide Heat';
  } else {
    if(zipLayer){map.removeLayer(zipLayer);zipLayer=null;}
    btn.style.background='';
    btn.textContent='🗺️ ZIP Heat';
  }
}

function renderZipShading(){
  if(zipLayer){map.removeLayer(zipLayer);zipLayer=null;}
  // Build avg price per ZIP from current data
  const zipData={};
  D.forEach(p=>{
    if(!p.z||!p.p) return;
    if(!zipData[p.z]){zipData[p.z]={sum:0,count:0,lats:[],lngs:[]};}
    zipData[p.z].sum+=p.p;
    zipData[p.z].count++;
    if(p.lat)zipData[p.z].lats.push(p.lat);
    if(p.lng)zipData[p.z].lngs.push(p.lng);
  });
  const avgs=Object.entries(zipData).map(([z,d])=>({zip:z,avg:d.sum/d.count,lats:d.lats,lngs:d.lngs}));
  if(!avgs.length) return;
  const prices=avgs.map(a=>a.avg);
  const minP=Math.min(...prices),maxP=Math.max(...prices);

  function getColor(avg){
    const t=(avg-minP)/(maxP-minP||1);
    // Blue (low) → Orange (mid) → Red (high)
    if(t<0.5){
      const r=Math.round(10+t*2*220);
      const g=Math.round(147-t*2*100);
      const b=Math.round(150+t*2*50);
      return 'rgba('+r+','+g+','+b+',0.35)';
    } else {
      const t2=(t-0.5)*2;
      const r=Math.round(230+t2*25);
      const g=Math.round(47-t2*47);
      const b=Math.round(200-t2*200);
      return 'rgba('+r+','+g+','+b+',0.35)';
    }
  }

  const layers=[];
  avgs.forEach(({zip,avg,lats,lngs})=>{
    if(!lats.length) return;
    const clat=lats.reduce((a,b)=>a+b,0)/lats.length;
    const clng=lngs.reduce((a,b)=>a+b,0)/lngs.length;
    const spread=0.018;
    const color=getColor(avg);
    const circle=L.circle([clat,clng],{
      radius:1400,color:'transparent',fillColor:color,fillOpacity:0.55,
    }).bindTooltip('ZIP '+zip+'<br>Avg: $'+Math.round(avg/1000)+'K',{permanent:false,className:'zip-tip'});
    layers.push(circle);
  });
  zipLayer=L.layerGroup(layers).addTo(map);
}

function nearMe(){
  if(!navigator.geolocation)return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    map.setView([lat,lng],14);
    L.marker([lat,lng],{
      icon:L.divIcon({
        className:'',
        html:'<div style="width:14px;height:14px;border-radius:50%;background:#f0a500;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>',
        iconSize:[14,14],iconAnchor:[7,7]
      })
    }).addTo(markerLayer).bindPopup('You are here').openPopup();
  },()=>alert('Unable to get your location'));
}

// ── TOGGLE LIST ──
function toggleList(){
  const panel=document.getElementById('list-panel');
  listVisible=!listVisible;
  panel.style.display=listVisible?'block':'none';
}
